pages:
  image: node:latest # 针对前端，选择合适的node镜像
  stage: build
  script:
    - echo "start build..."
    - rm -rf public/ && mkdir public
    - cp -r `ls | grep -v public` public/
    - ls -l public/
  cache:
    paths:
    - node_modules/
  artifacts:
    paths:
    - public
  tags:
    - gitlab-org
